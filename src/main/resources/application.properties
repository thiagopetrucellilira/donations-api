# ============================================================
# CONFIGURAÇÕES DE PRODUÇÃO - valores via variáveis de ambiente
# ============================================================

# Banco de dados (Railway injeta MYSQLHOST, MYSQLPORT, MYSQLDATABASE, MYSQLUSER, MYSQLPASSWORD)
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Pool de conexões (mais conservador em produção para respeitar limites gratuitos)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=30000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Porta — Railway injeta a variável PORT automaticamente
server.port=${PORT:8080}

# JWT — deve ser definida como variável de ambiente JWT_SECRET
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=86400000
app.jwt.issuer=donations-api
app.jwt.audience=donations-frontend

# Inicialização de dados
# NUNCA rodar schema.sql/data.sql em produção (apagaria dados): Hibernate ddl-auto=update cria as tabelas,
# e o DataInitializer.java insere dados iniciais apenas se o banco estiver vazio
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false

# Logs de produção (sem debug SQL)
logging.level.org.springframework.jdbc.datasource.init=INFO
logging.level.org.springframework.boot.sql=INFO
logging.level.com.donation=INFO

# Actuator — expõe health check com detalhe suficiente para o Railway detectar DOWN vs UP
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
management.health.db.enabled=true
