# Railway — configuração de deploy (sem Docker)
[build]
builder = "NIXPACKS"
buildCommand = "mvn clean package -DskipTests -B"

[deploy]
startCommand = "java -Dspring.profiles.active=prod -jar target/donation-api-0.0.1-SNAPSHOT.jar"
healthcheckPath = "/actuator/health"
healthcheckTimeout = 90
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
